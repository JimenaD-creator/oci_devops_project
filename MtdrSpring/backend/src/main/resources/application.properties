spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.type=oracle.ucp.jdbc.PoolDataSource
spring.datasource.oracleucp.connection-factory-class-name=oracle.jdbc.pool.OracleDataSource
spring.datasource.oracleucp.sql-for-validate-connection=select 1 from dual
spring.datasource.oracleucp.connection-pool-name=connectionPoolName1
spring.datasource.oracleucp.initial-pool-size=5
spring.datasource.oracleucp.min-pool-size=2
spring.datasource.oracleucp.max-pool-size=10

spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/XE}
spring.datasource.username=${DB_USERNAME:system}
spring.datasource.password=${DB_PASSWORD:oracle}

logging.level.root=INFO
logging.file.name=logs.log
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type=INFO

deepseek.api.key=${DEEPSEEK_API_KEY:sk-test}
deepseek.api.url=https://api.deepseek.com/v1/chat/completions

telegram.bot.token=${TELEGRAM_BOT_TOKEN:8336070482:AAE5hiBc8D2m1UA38YGjFX-wgua235RIRzM}
telegram.bot.name=${TELEGRAM_BOT_USERNAME:Tool_management_bot}
spring.cache.cache-names=sprints,tasks,projects,users
spring.cache.spec=maximumSize=100,expireAfterWrite=60s

server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,text/html,text/css
server.compression.min-response-size=2048

server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=100

spring.security.user.name=${UI_USERNAME:admin}
spring.security.user.password=${UI_PASSWORD:admin123}

gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# Async thread pool para GeminiService
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=gemini-async-